<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Translate - Myanmar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-magic"></i> AI Translate to Myanmar</h1>
        </header>

        <div class="step-card">
            <span class="step-title">STEP 1: API Access</span>
            <div class="select-box" style="color: #10b981;">
                <i class="fas fa-key"></i> AlzaSyClw9wm5sFlztBU_c... (Connected)
            </div>
        </div>

        <div class="step-card">
            <span class="step-title">STEP 2: Media Upload</span>
            <label for="audioFile" class="upload-area">
                <i class="fas fa-cloud-upload-alt" style="font-size: 1.5rem; color: #3b82f6;"></i>
                <p id="fileNameDisplay" style="margin: 5px 0;">Click or Drag & Drop</p>
                <small style="color: #94a3b8;">MP4, MP3, WAV (Max 500MB)</small>
            </label>
            <input type="file" id="audioFile" hidden>
        </div>

        <div class="step-card">
            <span class="step-title">STEP 3: Language & Model</span>
            <select class="select-box"><option>Burmese (မြန်မာဘာသာ)</option></select>
            <div style="margin-top: 15px;">
                <span class="step-title">AI Model</span>
                <select class="select-box"><option>Gemini 1.5 Flash Preview ✨</option></select>
            </div>
        </div>

        <button class="start-btn" onclick="startProcessing()">
            START PROCESSING <i class="fas fa-arrow-right"></i>
        </button>

        <div class="step-card" style="margin-top: 20px;">
            <span class="step-title">Output Result</span>
            <div id="outputArea" class="output-box">ရလဒ်ကို ဤနေရာတွင် ပြသပါမည်...</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
