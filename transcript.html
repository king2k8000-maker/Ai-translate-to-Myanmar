<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Translate - Myanmar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <i class="fas fa-bars"></i>
            <h1>AI Translate to Myanmar</h1>
            <i class="fas fa-cog" style="color: var(--accent-yellow);"></i>
        </header>

        <div class="step-card">
            <div class="step-header">
                <span class="step-title">STEP 1 &nbsp; API Access</span>
                <span class="status-badge">CONNECTED</span>
            </div>
            <div class="select-box" style="display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-key" style="color: #3b82f6;"></i>
                <span>AlzaSyClw9wm5sFlztBU_c...</span>
            </div>
        </div>

        <div class="step-card">
            <div class="step-header">
                <span class="step-title">STEP 2 &nbsp; Media Upload</span>
            </div>
            <label for="audioFile" class="upload-area">
                <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: #3b82f6;"></i>
                <p id="fileNameDisplay">Click or Drag & Drop</p>
                <small style="color: var(--text-dim);">MP4, MP3, WAV (Max 500MB)</small>
            </label>
            <input type="file" id="audioFile" hidden>
        </div>

        <div class="step-card">
            <span class="step-title">STEP 3 &nbsp; Language Selection</span>
            <select class="select-box"><option>Burmese (မြန်မာဘာသာ)</option></select>
            <div style="margin-top: 20px;">
                <span class="step-title">AI MODEL SELECTION</span>
                <select class="select-box"><option>Gemini 1.5 Flash Preview ✨</option></select>
            </div>
        </div>

        <button class="start-btn" onclick="startProcessing()">
            START PROCESSING <i class="fas fa-arrow-right"></i>
        </button>

        <div class="step-card" style="margin-top: 20px;">
            <span class="step-title">OUTPUT RESULT</span>
            <div id="outputArea" class="output-box">ရလဒ်ကို ဤနေရာတွင် ပြသပါမည်...</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
