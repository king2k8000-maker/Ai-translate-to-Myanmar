<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcript AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
    </script>
</head>
<body class="bg-[#0b1120] text-gray-200 min-h-screen p-4">

<div class="max-w-xl mx-auto space-y-6">
    <header class="text-center py-4">
        <h1 class="text-3xl font-bold text-white">Transcript <span class="text-blue-500">AI Studio</span></h1>
    </header>

    <div class="bg-[#161f32] p-5 rounded-2xl border border-gray-700 shadow-lg">
        <label class="text-xs text-gray-400 font-bold mb-2 block tracking-widest">API KEY</label>
        <input id="apiKey" type="password" placeholder="Enter Gemini API Key" 
            class="w-full p-3 rounded-xl bg-[#0b1120] border border-gray-600 mb-4 focus:border-blue-500 outline-none text-sm">
        
        <label class="text-xs text-gray-400 font-bold mb-2 block tracking-widest">SELECT MODEL</label>
        <select id="modelSelect" class="w-full p-3 rounded-xl bg-[#1e293b] border border-gray-600 focus:outline-none text-sm">
            <option value="gemini-1.5-flash">Gemini 1.5 Flash (Fastest)</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro (Accurate)</option>
            <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash (Exp)</option>
        </select>
    </div>

    <div class="bg-[#161f32] p-5 rounded-2xl border border-gray-700 shadow-lg">
        <input type="file" id="fileInput" class="mb-4 block w-full text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:bg-blue-600 file:text-white file:border-0 hover:file:bg-blue-700 cursor-pointer">
        
        <select id="taskType" class="w-full p-3 rounded-xl bg-[#1e293b] border border-gray-600 mb-6 text-sm">
            <option value="transcribe">Transcribe (Media to Text)</option>
            <option value="srt-translate">SRT to SRT Myanmar (Translate)</option>
        </select>

        <button id="actionBtn" onclick="processAI()" class="w-full bg-green-600 py-4 rounded-xl hover:bg-green-700 font-bold shadow-lg text-white">
            <i class="fas fa-play mr-2"></i> START PROCESS
        </button>
    </div>

    <div class="bg-black p-4 rounded-xl border border-gray-700">
        <textarea id="output" class="w-full h-80 bg-black text-green-400 text-xs font-mono outline-none resize-none" 
            placeholder="Result will appear here..." readonly></textarea>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    window.processAI = async function() {
        const key = document.getElementById("apiKey").value.trim();
        const fileInput = document.getElementById("fileInput");
        const output = document.getElementById("output");
        const btn = document.getElementById("actionBtn");
        const modelId = document.getElementById("modelSelect").value;
        const task = document.getElementById("taskType").value;

        if (!key || !fileInput.files[0]) return alert("Key သို့မဟုတ် File ထည့်ရန် လိုအပ်ပါသည်။");

        try {
            btn.disabled = true;
            btn.innerHTML = "Processing...";
            output.value = "[System]: Connecting to " + modelId + "...";

            const genAI = new GoogleGenerativeAI(key);
            const model = genAI.getGenerativeModel({ model: modelId });

            const file = fileInput.files[0];
            const base64Data = await new Promise((res) => {
                const reader = new FileReader();
                reader.onload = () => res(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });

            let prompt = (task === "srt-translate") 
                ? "Translate this SRT content to Myanmar. Keep SRT format." 
                : "Transcribe this media to Myanmar Unicode text.";

            const result = await model.generateContent([
                { inlineData: { data: base64Data, mimeType: file.type } },
                prompt
            ]);

            const response = await result.response;
            output.value = response.text();

        } catch (e) {
            output.value = "[Error]: " + e.message;
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-play mr-2"></i> START PROCESS';
        }
    }
</script>
</body>
</html>
