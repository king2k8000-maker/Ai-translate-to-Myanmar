<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcript AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
    </script>
</head>

<body class="bg-[#0b1120] text-gray-200 min-h-screen font-sans">

<div class="max-w-xl mx-auto p-4 space-y-6">

    <header class="text-center">
        <h1 class="text-3xl font-bold text-white">
            Transcript <span class="text-blue-500">AI Studio</span>
        </h1>
        <p class="text-gray-400 text-sm mt-1">Video to Text Engine</p>
    </header>

    <div class="bg-[#161f32] p-5 rounded-2xl border border-gray-700">
        <h2 class="text-sm text-gray-400 mb-3 uppercase font-semibold">API Access</h2>
        <input id="apiKey" type="password" placeholder="Enter Gemini API Key"
            class="w-full p-3 rounded-xl bg-[#0b1120] border border-gray-600 mb-3 focus:outline-none focus:border-blue-500 transition-all">
        
        <button onclick="checkKey()" class="w-full bg-blue-600 py-2 rounded-xl mb-3 hover:bg-blue-700 text-sm font-medium">
            Load Models
        </button>

        <select id="modelSelect"
            class="w-full p-3 rounded-xl bg-[#1e293b] border border-gray-600 focus:outline-none">
            <option value="gemini-3.1-flash">Default (Gemini 3.1 Flash Preview)</option>
            <option value="gemini-3.0-flash">Gemini 3.0 Flash Preview</option>
            <option value="gemini-3.1-pro">Gemini 3.1 Pro Preview</option>
            <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite Preview</option>
        </select>
    </div>

    <div class="bg-[#161f32] p-5 rounded-2xl border border-gray-700">
        <h2 class="text-sm text-gray-400 mb-3 uppercase font-semibold">Upload Media</h2>
        
        <div class="relative mb-4">
            <input type="file" id="fileInput" accept="audio/*,video/*" 
                class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
        </div>

        <select id="language" class="w-full p-3 rounded-xl bg-[#1e293b] border border-gray-600 mb-4 focus:outline-none">
            <option value="Auto">Auto Detect Language</option>
            <option value="Burmese">Burmese (မြန်မာစာ)</option>
            <option value="English">English</option>
        </select>

        <button onclick="startTranscribe()" id="actionBtn"
            class="w-full bg-green-600 py-4 rounded-xl hover:bg-green-700 font-bold transition-all shadow-lg active:scale-95">
            <i class="fas fa-play mr-2"></i> Start Transcription
        </button>
    </div>

    <div class="bg-black p-4 rounded-xl border border-gray-700 shadow-inner">
        <div class="flex justify-between items-center mb-2">
            <h3 class="text-xs text-gray-500 uppercase tracking-widest">Result Output</h3>
            <button onclick="copyText()" class="text-xs text-blue-500 hover:underline">Copy Transcript</button>
        </div>
        <textarea id="output"
            class="w-full h-64 bg-black text-green-400 text-sm font-mono outline-none resize-none leading-relaxed"
            placeholder="Transcription result will appear here..." readonly></textarea>
    </div>

</div>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // API Key Check function
    window.checkKey = function() {
        const key = document.getElementById("apiKey").value;
        if(key.length > 10) {
            alert("API Key detected. Models are ready! ✅");
        } else {
            alert("Please enter a valid API Key first ❗");
        }
    }

    // Main Transcription function
    window.startTranscribe = async function() {
        const key = document.getElementById("apiKey").value;
        const fileInput = document.getElementById("fileInput");
        const output = document.getElementById("output");
        const btn = document.getElementById("actionBtn");
        const selectedModel = document.getElementById("modelSelect").value;
        const lang = document.getElementById("language").value;

        if (!key) return alert("ကျေးဇူးပြု၍ API Key အရင်ထည့်ပါ 🔑");
        if (!fileInput.files[0]) return alert("Video သို့မဟုတ် Audio ဖိုင်တစ်ခု အရင်ရွေးပါ 📁");

        try {
            // Update UI State
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Transcribing...';
            output.value = `[System]: Using ${selectedModel}\n[System]: Analyzing media file. This may take 1-2 minutes depending on file size...`;

            // Initialize Gemini
            const genAI = new GoogleGenerativeAI(key);
            const model = genAI.getGenerativeModel({ model: selectedModel });

            // Convert file to Base64
            const file = fileInput.files[0];
            const base64Data = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });

            // Prompt setup
            const prompt = `Please transcribe this media file into text accurately. 
                            Target Language: ${lang}. 
                            If the language is Burmese, please provide the result in proper Myanmar Unicode. 
                            Output only the transcribed text without any extra commentary.`;

            // Call API
            const result = await model.generateContent([
                prompt,
                { inlineData: { data: base64Data, mimeType: file.type } }
            ]);

            const response = await result.response;
            const text = response.text();
            
            output.value = text || "No speech detected in this file.";

        } catch (error) {
            console.error("API Error:", error);
            output.value = "Error: " + error.message + "\n\n(Tip: Check if your API Key is valid and if you have selected a supported model version.)";
        } finally {
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
            btn.innerHTML = '<i class="fas fa-play mr-2"></i> Start Transcription';
        }
    }

    // Copy to clipboard function
    window.copyText = function() {
        const output = document.getElementById("output");
        if (!output.value) return;
        output.select();
        document.execCommand("copy");
        alert("Transcript copied to clipboard! 📋");
    }
</script>

</body>
</html>
