<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcript AI Studio</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-[#0b1120] text-gray-200 min-h-screen font-sans">

<div class="max-w-xl mx-auto p-4 space-y-6">

    <!-- Header -->
    <header class="text-center">
        <h1 class="text-3xl font-bold text-white">
            Transcript <span class="text-blue-500">AI Studio</span>
        </h1>
        <p class="text-gray-400 text-sm mt-1">Video to Text Engine</p>
    </header>

    <!-- API Section -->
    <div class="bg-[#161f32] p-5 rounded-2xl border border-gray-700">
        <h2 class="text-sm text-gray-400 mb-3">API Access</h2>

        <input id="apiKey" type="password" placeholder="Enter API Key"
            class="w-full p-3 rounded-xl bg-[#0b1120] border border-gray-600 mb-3">

        <button onclick="loadModels()"
            class="w-full bg-blue-600 py-3 rounded-xl hover:bg-blue-700">
            Load Models
        </button>

        <select id="modelSelect"
            class="w-full mt-3 p-3 rounded-xl bg-[#1e293b] border border-gray-600">
            <option>Gemini 3.1 Flash</option>
            <option>Gemini 3.0 Flash</option>
            <option>Gemini 3.0 Pro</option>
        </select>
    </div>

    <!-- Upload Section -->
    <div class="bg-[#161f32] p-5 rounded-2xl border border-gray-700">

        <h2 class="text-sm text-gray-400 mb-3">Upload Media</h2>

        <input type="file" id="fileInput" class="mb-3 text-sm">

        <p id="fileName" class="text-green-400 text-sm"></p>

        <select class="w-full p-3 rounded-xl bg-[#1e293b] border border-gray-600 mb-3">
            <option>Auto Language</option>
            <option>English</option>
            <option>Burmese</option>
        </select>

        <button onclick="startTranscribe()"
            class="w-full bg-green-600 py-3 rounded-xl hover:bg-green-700">
            Start Transcription
        </button>
    </div>

    <!-- Output -->
    <div class="bg-black p-4 rounded-xl border border-gray-700">
        <h3 class="text-sm text-gray-400 mb-2">Result</h3>
        <textarea id="output"
            class="w-full h-40 bg-black text-green-400 text-sm outline-none"
            placeholder="Transcript will appear here..."></textarea>
    </div>

</div>

<!-- JavaScript -->
<script>

function loadModels() {
    alert("Models Loaded Successfully ✅");
}

document.getElementById("fileInput").addEventListener("change", function() {
    const file = this.files[0];
    if (file) {
        document.getElementById("fileName").innerText = "Selected: " + file.name;
    }
});

function startTranscribe() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please select a file first ❗");
        return;
    }

    // Demo Output (Fake AI result)
    document.getElementById("output").value =
        "🎧 Transcribing...\n\nHello, this is a sample transcript from your audio/video file.";
}

</script>

</body>
</html>
