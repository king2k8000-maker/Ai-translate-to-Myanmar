<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Translate Myanmar</title>
    <style>
        /* သင့်ရဲ့ လက်ရှိ CSS Design တွေကို ဒီမှာထားပါ */
        body { background-color: #0b1426; color: white; font-family: sans-serif; padding: 20px; }
        .box { background: #16213e; padding: 20px; border-radius: 15px; text-align: center; }
        input, button { margin-top: 10px; padding: 10px; border-radius: 5px; width: 100%; }
        #output { margin-top: 20px; background: #0f172a; padding: 10px; min-height: 100px; border: 1px solid #334155; }
    </style>
</head>
<body>

<div class="box">
    <h3>AI Translate to Myanmar</h3>
    <input type="file" id="audioFile" accept="audio/*,video/*">
    <button onclick="startProcessing()">START PROCESSING</button>
    <div id="output">ရလဒ်ကို ဒီမှာပြပါမယ်...</div>
</div>

<script>
    // ဒီနေရာမှာ သင့် API Key ကို ထည့်ပါ
    const API_KEY = "သင့်ရဲ့_API_KEY_ကိုဒီမှာထည့်ပါ"; 

    async function startProcessing() {
        const fileInput = document.getElementById('audioFile');
        const output = document.getElementById('output');

        if (!fileInput.files[0]) {
            alert("ဖိုင်ရွေးပါ");
            return;
        }

        output.innerText = "ဘာသာပြန်နေပါပြီ... ခဏစောင့်ပါ ⏳";

        try {
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Data = reader.result.split(',')[1];
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Transcribe and translate this to Myanmar language." },
                                { inline_data: { mime_type: file.type, data: base64Data } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                output.innerText = data.candidates[0].content.parts[0].text;
            };
        } catch (e) {
            output.innerText = "Error တက်နေပါတယ်။ API Key ကို ပြန်စစ်ပါ။";
        }
    }
</script>

</body>
</html>
