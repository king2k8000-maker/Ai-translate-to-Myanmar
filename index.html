<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcript AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
    </script>
</head>
<body class="bg-[#0b1120] text-gray-200 min-h-screen">

<div class="max-w-xl mx-auto p-4 space-y-6">
    <header class="text-center py-6">
        <h1 class="text-3xl font-bold text-white italic">Transcript <span class="text-blue-500">AI Studio</span></h1>
        <p class="text-xs text-gray-500 mt-2 uppercase tracking-widest">Advanced Media Processing</p>
    </header>

    <div class="bg-[#161f32] p-5 rounded-2xl border border-gray-700 shadow-xl">
        <h2 class="text-xs text-gray-400 mb-3 font-bold uppercase tracking-tighter">API Configuration</h2>
        <input id="apiKey" type="password" placeholder="Paste your Gemini API Key here" 
            class="w-full p-3 rounded-xl bg-[#0b1120] border border-gray-600 mb-3 focus:border-blue-500 outline-none transition-all">
        
        <select id="modelSelect" class="w-full p-3 rounded-xl bg-[#1e293b] border border-gray-600 focus:outline-none cursor-pointer">
            <option value="gemini-1.5-flash">Gemini 1.5 Flash (မြန်ဆန်သည်)</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro (ပိုမိုတိကျသည်)</option>
            <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash (Experimental)</option>
        </select>
    </div>

    <div class="bg-[#161f32] p-5 rounded-2xl border border-gray-700 shadow-xl">
        <h2 class="text-xs text-gray-400 mb-3 font-bold uppercase">Media & Task</h2>
        
        <input type="file" id="fileInput" accept="audio/*,video/*,.srt" 
            class="mb-4 block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:bg-blue-600 file:text-white file:border-0 hover:file:bg-blue-700 cursor-pointer">
        
        <div class="grid grid-cols-1 gap-3 mb-4">
            <select id="taskType" class="w-full p-3 rounded-xl bg-[#1e293b] border border-gray-600 focus:outline-none">
                <option value="transcribe">Transcribe (Video/Audio to Text)</option>
                <option value="srt-translate">SRT to SRT Myanmar (ဘာသာပြန်)</option>
            </select>
        </div>

        <button id="actionBtn" class="w-full bg-green-600 py-4 rounded-xl hover:bg-green-700 font-bold transition-all shadow-lg active:scale-95 text-white">
            <i class="fas fa-magic mr-2"></i> Start Process
        </button>
    </div>

    <div class="bg-black p-4 rounded-xl border border-gray-700 shadow-2xl">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-xs text-gray-500 font-bold uppercase">Result Output</h3>
            <button onclick="copyText()" class="text-xs text-blue-400 hover:text-blue-300 font-semibold px-2 py-1 border border-blue-900 rounded">
                <i class="fas fa-copy mr-1"></i> Copy
            </button>
        </div>
        <textarea id="output" class="w-full h-72 bg-black text-green-400 text-sm font-mono outline-none resize-none leading-relaxed" 
            placeholder="ရလဒ်ကို ဤနေရာတွင် ပြသပါမည်..." readonly></textarea>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
