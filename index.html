<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tools Design</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ဒီနေရာမှာ CSS တွေကို တစ်ခါတည်း ထည့်ပေးထားပါတယ် */
        body {
            background-color: #0b1426; /* Dark Navy Background */
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
        }

        .section-title {
            font-size: 0.9rem;
            color: #8a99af;
            margin: 20px 0 10px 0;
            border-left: 3px solid #9b59b6;
            padding-left: 10px;
        }

        /* Card များကို ဘေးတိုက်စီရန် */
        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .tool-card {
            background-color: #16213e;
            border: 1px solid #252d44;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .tool-card i {
            font-size: 1.5rem;
            color: #4e89fe;
            margin-bottom: 10px;
        }

        .tool-card h4 { margin: 5px 0; font-size: 1rem; }
        .tool-card p { font-size: 0.75rem; color: #8a99af; margin: 0; }

        /* Telegram Button */
        .telegram-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 136, 204, 0.1);
            border: 1px solid #0088cc;
            padding: 12px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            margin: 25px 0;
        }

        .telegram-btn i { margin-right: 10px; color: #0088cc; }
    </style>
</head>
<body>

<div class="container">
    <h3 class="section-title">VIDEO TOOLS</h3>
    
    <div class="card-grid">
        <div class="tool-card">
            <i class="fas fa-video"></i>
            <h4>Video Editor</h4>
            <p>Online Editing</p>
        </div>

        <div class="tool-card">
            <i class="fas fa-magic"></i>
            <h4>Recapper AI</h4>
            <p>Video Summarizer</p>
        </div>
    </div>

    <a href="#" class="telegram-btn">
        <i class="fab fa-telegram"></i> JOIN OUR COMMUNITY Telegram Channel
    </a>
</div>

</body>
</html>
