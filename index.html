<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle Studio</title>
    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background-color: #161b22;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .title {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .section-label {
            color: #4da3ff;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .input-field {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 14px;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        select.input-field {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 20px;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .connect-btn { background-color: #2f81f7; color: white; }
        .download-btn { background-color: #238636; color: white; display: none; }

        .api-status {
            color: #3fb950;
            text-align: center;
            font-style: italic;
            font-size: 16px;
            margin-bottom: 30px;
            display: none;
        }

        .upload-box {
            border: 2px dashed #4da3ff;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            background-color: rgba(77, 163, 255, 0.05);
            margin-bottom: 20px;
        }

        .upload-icon { font-size: 40px; display: block; margin-bottom: 10px; }
        
        #file-input { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="title">Subtitle Studio</div>

    <div class="section-label">1. API & MODEL SETUP</div>
    <input type="password" id="api-key" class="input-field" placeholder="Paste Gemini API Key Here">
    
    <select id="model-select" class="input-field">
        <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
        <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        <option value="gemini-3.0-flash">Gemini 3.0 Flash</option>
    </select>

    <button class="btn connect-btn" onclick="connectAPI()">Connect API Key</button>
    <div id="status" class="api-status">✅ API Connected!</div>

    <div class="section-label">2. UPLOAD SOURCE (MP3 OR SRT)</div>
    <div class="upload-box" onclick="document.getElementById('file-input').click()">
        <span class="upload-icon">📥</span>
        <div id="file-name" class="upload-text">Click to Select File</div>
    </div>
    <input type="file" id="file-input" accept=".mp3, .srt" onchange="updateFileName()">

    <button id="dl-btn" class="btn download-btn">Download SRT</button>
</div>

<script>
    function connectAPI() {
        const key = document.getElementById('api-key').value;
        if(key.length > 10) {
            document.getElementById('status').style.display = 'block';
            alert("API Connected Successfully!");
        } else {
            alert("Please enter a valid API Key");
        }
    }

    function updateFileName() {
        const input = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');
        const dlBtn = document.getElementById('dl-btn');
        
        if (input.files.length > 0) {
            fileNameDisplay.innerText = input.files[0].name;
            // File ရွေးပြီးရင် Download button ပြပေးမည်
            dlBtn.style.display = 'block';
        }
    }
</script>

</body>
</html>
