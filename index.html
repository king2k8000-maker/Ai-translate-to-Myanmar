<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcript AI Studio - All-in-One</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
    </script>

    <style>
        body { background-color: #0b1120; font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        textarea:focus { border-color: #3b82f6; }
    </style>
</head>
<body class="text-gray-200 min-h-screen p-4">

<div class="max-w-xl mx-auto space-y-6">
    <header class="text-center py-4">
        <h1 class="text-3xl font-bold text-white">Transcript <span class="text-blue-500">AI Studio</span></h1>
        <p class="text-xs text-gray-500 mt-1 uppercase tracking-widest">Video to Text & SRT Translate</p>
    </header>

    <div class="bg-[#161f32] p-5 rounded-2xl border border-gray-700 shadow-lg">
        <label class="text-xs text-gray-400 font-bold mb-2 block">GEMINI API KEY</label>
        <input id="apiKey" type="password" placeholder="Paste your API Key here" 
            class="w-full p-3 rounded-xl bg-[#0b1120] border border-gray-600 mb-4 focus:border-blue-500 outline-none text-sm transition-all">
        
        <label class="text-xs text-gray-400 font-bold mb-2 block">SELECT MODEL</label>
        <select id="modelSelect" class="w-full p-3 rounded-xl bg-[#1e293b] border border-gray-600 focus:outline-none text-sm cursor-pointer">
            <option value="gemini-1.5-flash">Gemini 1.5 Flash (Fast & Recommended)</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro (Best for complex SRT)</option>
            <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash (Exp)</option>
        </select>
    </div>

    <div class="bg-[#161f32] p-5 rounded-2xl border border-gray-700 shadow-lg">
        <label class="text-xs text-gray-400 font-bold mb-2 block">UPLOAD FILE (VIDEO/AUDIO/SRT)</label>
        <input type="file" id="fileInput" class="mb-4 block w-full text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:bg-blue-600 file:text-white file:border-0 hover:file:bg-blue-700 cursor-pointer">
        
        <label class="text-xs text-gray-400 font-bold mb-2 block">CHOOSE TASK</label>
        <select id="taskType" class="w-full p-3 rounded-xl bg-[#1e293b] border border-gray-600 mb-6 focus:outline-none text-sm">
            <option value="transcribe">Transcribe (Media to Text)</option>
            <option value="srt-translate">SRT to SRT Myanmar (ဘာသာပြန်)</option>
        </select>

        <button id="actionBtn" class="w-full bg-green-600 py-4 rounded-xl hover:bg-green-700 font-bold transition-all shadow-lg active:scale-95 text-white">
            <i class="fas fa-play mr-2"></i> START PROCESS
        </button>
    </div>

    <div class="bg-black p-4 rounded-xl border border-gray-700 shadow-2xl">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Result Output</h3>
            <button onclick="copyText()" class="text-[10px] text-blue-400 border border-blue-900 px-3 py-1 rounded hover:bg-blue-900/30 transition-all">COPY</button>
        </div>
        <textarea id="output" class="w-full h-80 bg-black text-green-500 text-xs font-mono outline-none resize-none custom-scroll leading-relaxed" 
            placeholder="AI ၏ ရလဒ်ကို ဤနေရာတွင် ပြသပါမည်..." readonly></textarea>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    async function startProcess() {
        const apiKey = document.getElementById("apiKey").value.trim();
        const fileInput = document.getElementById("fileInput");
        const output = document.getElementById("output");
        const btn = document.getElementById("actionBtn");
        const modelId = document.getElementById("modelSelect").value;
        const task = document.getElementById("taskType").value;

        if (!apiKey) return alert("ကျေးဇူးပြု၍ API Key ထည့်ပေးပါ 🔑");
        if (!fileInput.files[0]) return alert("ဖိုင်တစ်ခုအရင်ရွေးပေးပါ 📁");

        try {
            // UI Loading State
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> AI Processing...';
            output.value = `[System]: Connecting to ${modelId}...\n[System]: Analyzing your file...`;

            const genAI = new GoogleGenerativeAI(apiKey);
            const model = genAI.getGenerativeModel({ model: modelId });

            const file = fileInput.files[0];
            const base64Data = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });

            // Prompt Engineering
            let prompt = "";
            if (task === "srt-translate") {
                prompt = "Translate this SRT content into Myanmar language (Unicode). Keep the exact timing format. Only translate the text.";
            } else {
                prompt = "Transcribe this media file. If Burmese, use Myanmar Unicode. Provide text transcript only.";
            }

            const result = await model.generateContent([
                {
                    inlineData: {
                        data: base64Data,
                        mimeType: file.type || "application/octet-stream"
                    }
                },
                prompt
            ]);

            const response = await result.response;
            output.value = response.text();

        } catch (error) {
            console.error(error);
            let msg = error.message;
            if(msg.includes("404")) msg = "Error 404: Model ID မမှန်ပါ။ Gemini 1.5 Flash ကို ရွေးစမ်းကြည့်ပါ။";
            output.value = "[Error]: " + msg;
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-play mr-2"></i> START PROCESS';
        }
    }

    // Attach to button
    document.getElementById("actionBtn").addEventListener("click", startProcess);

    // Copy to clipboard
    window.copyText = function() {
        const area = document.getElementById("output");
        if (!area.value) return;
        area.select();
        document.execCommand("copy");
        alert("Copied to clipboard! ✅");
    };
</script>

</body>
</html>
