<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle Studio</title>
    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #161b22;
            width: 380px;
            padding: 40px 30px;
            border-radius: 16px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .title {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .section-label {
            color: #4da3ff;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .input-field {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 14px;
            color: #8b949e;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        select.input-field {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 20px;
            color: white;
        }

        .connect-btn {
            width: 100%;
            background-color: #2f81f7;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .api-status {
            color: #3fb950;
            text-align: center;
            font-style: italic;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .upload-box {
            border: 2px dashed #30363d;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-box:hover {
            border-color: #4da3ff;
            background-color: #1c2128;
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
        }

        .upload-text {
            font-size: 18px;
            color: #f0f6fc;
        }

        /* Download button for final step */
        .download-area {
            margin-top: 20px;
            display: none; /* hidden initially */
        }
    </style>
</head>
<body>

<div class="card">
    <div class="title">Subtitle Studio</div>

    <div class="section-label">1. API & MODEL SETUP</div>
    
    <input type="text" class="input-field" placeholder="Paste Gemini API Key Here">
    
    <select class="input-field">
        <option>Gemini 1.5 Pro</option>
        <option>Gemini 1.5 Flash</option>
        <option>Gemini 2.5 Flash</option>
        <option>Gemini 3.0 Flash</option>
    </select>

    <button class="connect-btn">Connect API Key</button>
    
    <div class="api-status">✅ API Connected!</div>

    <div class="section-label">2. UPLOAD SOURCE (MP3 OR SRT)</div>
    
    <div class="upload-box">
        <span class="upload-icon">📥</span>
        <div class="upload-text">Click to Select File</div>
    </div>

    <div id="download-section" style="margin-top: 20px; text-align: center;">
        <button class="connect-btn" style="background-color: #238636;">Download SRT</button>
    </div>
</div>

</body>
</html>
