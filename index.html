<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Media Processor</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f1f5f9;
            --border-color: #334155;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
        }

        h2 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        select, input[type="file"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: white;
            box-sizing: border-box;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 2rem;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .process-btn {
            background-color: var(--accent-color);
            color: #000;
        }

        .download-btn {
            background-color: #10b981;
            color: white;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .status {
            margin-top: 1rem;
            font-size: 0.85rem;
            text-align: center;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Media Translator</h2>

    <div class="input-group">
        <label>Select Gemini Flash Model</label>
        <select id="model-select">
            <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
            <option value="gemini-3.0-flash">Gemini 3.0 Flash</option>
        </select>
    </div>

    <div class="input-group">
        <label>Upload MP3 or SRT File</label>
        <input type="file" id="file-input" accept=".mp3, .srt">
    </div>

    <div class="btn-container">
        <button class="process-btn">Process to MMSub</button>
        <button class="download-btn">Download SRT</button>
    </div>

    <div class="status" id="status-text">Ready to process...</div>
</div>

</body>
</html>
