<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Translate to Myanmar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #0b1426;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            margin: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .step-container {
            background-color: #16213e;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #252d44;
        }

        .step-header {
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .step-header span { color: #8a99af; text-transform: uppercase; }

        /* API Access Box */
        .input-box {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-box input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            outline: none;
        }

        /* Upload Box */
        .upload-area {
            border: 2px dashed #1e293b;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
        }

        .upload-area i { font-size: 2rem; color: #4e89fe; margin-bottom: 10px; }

        /* Selection Box */
        .select-group {
            margin-bottom: 15px;
        }

        .select-group label {
            display: block;
            font-size: 0.7rem;
            color: #8a99af;
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            background-color: #0f172a;
            color: white;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 10px;
        }

        .status-badge {
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 5px;
            float: right;
        }

        .process-btn {
            width: 100%;
            background-color: #4e89fe;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <i class="fas fa-bars"></i>
        <h3>AI Translate to Myanmar</h3>
        <i class="fas fa-cog" style="color: #f1c40f;"></i>
    </header>

    <div class="step-container">
        <div class="step-header">
            <span>STEP 1</span> <b>API Access</b>
            <div class="status-badge">CONNECTED</div>
        </div>
        <div class="input-box">
            <i class="fas fa-key"></i>
            <input type="password" value="AIzaSyClw9wm5sFlztBU_c">
            <i class="fas fa-eye-slash"></i>
        </div>
    </div>

    <div class="step-container">
        <div class="step-header">
            <span>STEP 2</span> <b>Media Upload</b>
        </div>
        <div class="upload-area">
            <i class="fas fa-cloud-upload-alt"></i>
            <div><b>Click or Drag & Drop</b></div>
            <p style="font-size: 0.7rem; color: #8a99af;">MP4, MP3, WAV, MKV (Max 500MB)</p>
        </div>
    </div>

    <div class="step-container">
        <div class="step-header">
            <span>STEP 3</span> <b>Language Selection</b>
        </div>
        <div class="select-group">
            <label>AUDIO LANGUAGE</label>
            <select>
                <option>Auto-detect Language</option>
            </select>
        </div>
        <div class="select-group">
            <label>OUTPUT LANGUAGE</label>
            <select>
                <option>Burmese (မြန်မာဘာသာ)</option>
            </select>
        </div>
    </div>

    <button class="process-btn">START PROCESSING</button>
</div>

</body>
</html>
