<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle Studio - AI Translator</title>
    <script type="importmap">
        {
          "imports": {
            "@google/generative-ai": "https://esm.run/@google/generative-ai"
          }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .card {
            background-color: #1e293b;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
            color: #ffffff;
        }

        .label {
            font-size: 12px;
            font-weight: 800;
            color: #3b82f6;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-box {
            width: 100%;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 14px;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
        }

        select.input-box {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 18px;
        }

        .btn-blue {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .status-msg {
            text-align: center;
            font-size: 14px;
            color: #22c55e;
            margin-bottom: 20px;
            display: none;
        }

        .upload-area {
            border: 2px dashed #334155;
            border-radius: 16px;
            padding: 35px 15px;
            text-align: center;
            cursor: pointer;
            background-color: rgba(15, 23, 42, 0.5);
            margin-bottom: 20px;
        }

        .upload-icon {
            font-size: 35px;
            color: #3b82f6;
            margin-bottom: 10px;
        }

        .row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .row div { flex: 1; }

        .btn-green {
            width: 100%;
            background-color: #16a34a;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
        }

        .result-area {
            background-color: #000000;
            border-radius: 12px;
            padding: 15px;
            min-height: 150px;
            border: 1px solid #334155;
            color: #22c55e;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .btn-download {
            float: right;
            background-color: #1e3a8a;
            color: #38bdf8;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Subtitle Studio</h1>

    <div class="card">
        <div class="label">1. API & MODEL SETUP</div>
        <input type="password" id="apiKey" class="input-box" placeholder="Paste Gemini API Key Here">
        
        <select id="modelSelect" class="input-box">
            <option value="gemini-3-flash-preview-0514">Default (Gemini 3 Flash Preview)</option>
            <option value="gemini-3-flash-preview-0514" selected>Gemini 3 Flash Preview</option>
            <option value="gemini-1.5-pro">Gemini 3.1 Pro Preview</option>
            <option value="gemini-1.5-flash-8b">Gemini 3.1 Flash Lite Preview</option>
        </select>

        <button class="btn-blue" id="connectBtn">Connect API Key</button>
        <div id="apiStatus" class="status-msg">✅ API Connected!</div>
    </div>

    <div class="card">
        <div class="label">2. UPLOAD SOURCE (MP3 OR SRT)</div>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">⬆</div>
            <div id="file-name" style="font-weight: bold;">Choose a media file</div>
            <div style="font-size: 12px; color: #94a3b8; margin-top: 5px;">Selected file will appear here</div>
        </div>
        <input type="file" id="fileInput" hidden accept=".srt,.txt">

        <div class="row">
            <div>
                <div class="label" style="font-size: 10px;">LANGUAGE</div>
                <select class="input-box"><option>Myanmar</option><option>English</option></select>
            </div>
            <div>
                <div class="label" style="font-size: 10px;">FORMAT</div>
                <select class="input-box"><option>SRT</option><option>TXT</option></select>
            </div>
        </div>

        <button class="btn-green" id="startBtn">Start Transcription</button>
    </div>

    <div class="card">
        <div style="overflow: hidden;">
            <div class="label" style="float: left;">RESULT</div>
            <button class="btn-download" id="dlBtn">📥 Download Result</button>
        </div>
        <div class="result-area" id="output">Transcript will appear here...</div>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    let selectedFileText = "";

    // API Connection
    document.getElementById('connectBtn').addEventListener('click', () => {
        const key = document.getElementById('apiKey').value;
        if(key.length > 10) {
            document.getElementById('apiStatus').style.display = 'block';
        } else {
            alert("Please enter a valid Gemini API Key");
        }
    });

    // Handle File Upload
    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) {
            document.getElementById('file-name').innerText = "Selected: " + file.name;
            selectedFileText = await file.text();
        }
    });

    // Start Translation Logic
    document.getElementById('startBtn').addEventListener('click', async () => {
        const key = document.getElementById('apiKey').value;
        const output = document.getElementById('output');
        const modelName = document.getElementById('modelSelect').value;

        if (!key) return alert("API Key အရင်ထည့်ပါ");
        if (!selectedFileText) return alert("ဖိုင်အရင်ရွေးချယ်ပါ");

        output.innerText = "Gemini AI is translating to Myanmar... Please wait...";

        try {
            const genAI = new GoogleGenerativeAI(key);
            const model = genAI.getGenerativeModel({ model: modelName });

            const prompt = `Translate the following subtitle text into Myanmar (Burmese). 
            CRITICAL: Keep the original timecodes (00:00:00,000) and line numbers exactly the same.
            Only translate the spoken text. 
            Text to translate:\n\n${selectedFileText}`;

            const result = await model.generateContent(prompt);
            const response = await result.response;
            const translatedText = response.text();
            
            output.innerText = translatedText;
            document.getElementById('dlBtn').style.display = 'block';

            // Download Function
            document.getElementById('dlBtn').onclick = () => {
                const blob = new Blob([translatedText], { type: 'text/plain' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "translated_mmsub.srt";
                a.click();
            };

        } catch (error) {
            output.innerText = "Error: " + error.message;
        }
    });
</script>

</body>
</html>
