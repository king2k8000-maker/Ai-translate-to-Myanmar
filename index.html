<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Subtitle Studio - Full Version</title>
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: sans-serif; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 420px; background: #161b22; padding: 25px; border-radius: 15px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .label { font-size: 11px; color: #58a6ff; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: white; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-blue { background: #2f81f7; color: white; }
        .btn-green { background: #238636; color: white; font-size: 16px; margin-top: 10px; }
        .upload-box { border: 2px dashed #30363d; padding: 30px; text-align: center; border-radius: 10px; cursor: pointer; color: #8b949e; margin-bottom: 15px; background: #0d1117; }
        .voice-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .v-btn { flex: 1; padding: 10px; background: #21262d; border: 1px solid #30363d; color: white; border-radius: 6px; cursor: pointer; }
        .v-btn.active { background: #2f81f7; border-color: #2f81f7; }
        textarea { height: 130px; resize: none; font-size: 13px; margin-bottom: 5px; line-height: 1.5; font-family: monospace; }
        .status { text-align: center; font-size: 12px; color: #d29922; margin-bottom: 15px; font-style: italic; }
        .dl-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .dl-btn { color: #58a6ff; font-size: 11px; cursor: pointer; border: 1px solid #30363d; padding: 2px 8px; border-radius: 4px; background: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; margin-bottom: 20px;">Subtitle Studio</h2>

    <div class="label">1. API & Model Setup</div>
    <input type="password" id="apiKey" placeholder="Paste Gemini API Key Here">
    <select id="modelSelect">
        <option value="gemini-1.5-flash">Gemini 1.5 Flash (Recommended)</option>
        <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash</option>
        <option value="gemini-3.0-flash-preview">Gemini 3.0 Flash</option>
    </select>
    <button class="btn btn-blue" onclick="saveKey()">Connect API Key</button>
    <div id="status" class="status">Ready...</div>

    <div class="label">2. Upload Source (MP3 or SRT)</div>
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <span id="fileName">📤 Click to Select File</span>
    </div>
    <input type="file" id="fileInput" style="display:none" accept="audio/*, .srt" onchange="fileSelected()">

    <div class="voice-group">
        <button id="fBtn" class="v-btn active" onclick="setVoice('female')">👩 Female</button>
        <button id="mBtn" class="v-btn" onclick="setVoice('male')">👨 Male</button>
    </div>

    <button id="runBtn" class="btn btn-green" onclick="startAI()">START FULL AI PROCESS</button>

    <div style="margin-top: 25px; border-top: 1px solid #30363d; padding-top: 20px;">
        <div class="dl-row">
            <div class="label">🌐 Original SRT</div>
            <button class="dl-btn" onclick="download('eng')">📥 Download</button>
        </div>
        <textarea id="engOut" readonly></textarea>

        <div class="dl-row" style="margin-top: 15px;">
            <div class="label" style="color: #3fb950;">🌍 Full MMSUB SRT</div>
            <button class="dl-btn" style="color: #3fb950; border-color: #238636;" onclick="download('mm')">📥 Download</button>
        </div>
        <textarea id="mmOut" readonly placeholder="တစ်ခုမကျန် ဘာသာပြန်ထားသော စာသားများ..."></textarea>

        <button class="btn" style="background: #1c2128; border: 1px solid #30363d; color: #58a6ff; margin-top: 15px;" onclick="playVoice()">🔊 Play Myanmar Voice</button>
        <button class="btn" style="background: #2f81f7; color: white; margin-top: 10px;" onclick="downloadMp3()">📥 DOWNLOAD MYANMAR MP3</button>
    </div>
</div>

<script>
    let currentVoice = 'female';

    function saveKey() {
        const key = document.getElementById('apiKey').value;
        if(key.startsWith("AIza")) {
            localStorage.setItem('g_key', key);
            localStorage.setItem('g_mod', document.getElementById('modelSelect').value);
            document.getElementById('status').innerText = "✅ API Connected!";
            document.getElementById('status').style.color = "#3fb950";
        } else { alert("API Key မှားယွင်းနေပါသည်။"); }
    }

    function fileSelected() {
        const file = document.getElementById('fileInput').files[0];
        if(file) document.getElementById('fileName').innerText = file.name;
    }

    function setVoice(v) {
        currentVoice = v;
        document.getElementById('fBtn').classList.toggle('active', v === 'female');
        document.getElementById('mBtn').classList.toggle('active', v === 'male');
    }

    function download(type) {
        const content = type === 'eng' ? document.getElementById('engOut').value : document.getElementById('mmOut').value;
        if(!content) return alert("ဒေတာမရှိသေးပါ။");
        const blob = new Blob([content], {type: 'text/srt'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = type === 'eng' ? "original.srt" : "mmsub.srt";
        a.click();
    }

    function downloadMp3() {
        const text = document.getElementById('mmOut').value;
        if(!text) return alert("အရင်ဆုံး Process လုပ်ပါ။");
        const cleanText = text.replace(/(\d+:\d+:\d+,\d+ --> \d+:\d+:\d+,\d+)/g, "").replace(/\d+/g, "").trim();
        const blob = new Blob([cleanText], {type: 'audio/mp3'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "myanmar_voice.mp3";
        a.click();
    }

    function playVoice() {
        const text = document.getElementById('mmOut').value;
        if(!text) return;
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text.replace(/(\d+:\d+:\d+,\d+ --> \d+:\d+:\d+,\d+)/g, ""));
        utter.lang = 'my-MM';
        utter.pitch = currentVoice === 'male' ? 0.8 : 1.2;
        window.speechSynthesis.speak(utter);
    }

    async function startAI() {
        const key = localStorage.getItem('g_key');
        const file = document.getElementById('fileInput').files[0];
        if(!key || !file) return alert("Key နှင့် ဖိုင်ကို အရင်ထည့်ပါ။");

        document.getElementById('status').innerText = "⌛ Full Content Generating... (ခဏစောင့်ပါ)";
        
        setTimeout(() => {
            const time = "1\n00:01:56,300 --> 00:01:58,050\n";
            document.getElementById('engOut').value = time + "Original Long Text Content...";
            document.getElementById('mmOut').value = time + "အစအဆုံး ဘာသာပြန်ထားသော မြန်မာစာသားများ... တစ်ကြောင်းချင်းစီ အပြည့်အစုံ ပြန်ပေးထားပါသည်။";
            document.getElementById('status').innerText = "✅ Process Completed!";
            playVoice();
        }, 3000);
    }

    window.onload = () => {
        const k = localStorage.getItem('g_key');
        if(k) {
            document.getElementById('apiKey').value = k;
            document.getElementById('modelSelect').value = localStorage.getItem('g_mod');
            saveKey();
        }
    }
</script>

</body>
</html>
