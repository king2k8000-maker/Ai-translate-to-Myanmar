<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcript AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
    </script>
</head>
<body class="bg-[#0b1120] text-gray-200 min-h-screen">

<div class="max-w-xl mx-auto p-4 space-y-6">
    <header class="text-center py-6">
        <h1 class="text-3xl font-bold text-white italic">Transcript <span class="text-blue-500">AI Studio</span></h1>
        <p class="text-[10px] text-gray-500 mt-2 uppercase tracking-[0.2em]">Next-Gen Media Engine</p>
    </header>

    <div class="bg-[#161f32] p-5 rounded-2xl border border-gray-700 shadow-xl">
        <label class="text-xs text-gray-400 font-bold mb-2 block">API KEY</label>
        <input id="apiKey" type="password" placeholder="Enter Gemini API Key" 
            class="w-full p-3 rounded-xl bg-[#0b1120] border border-gray-600 mb-4 focus:border-blue-500 outline-none transition-all text-sm">
        
        <label class="text-xs text-gray-400 font-bold mb-2 block">SELECT MODEL</label>
        <select id="modelSelect" class="w-full p-3 rounded-xl bg-[#1e293b] border border-gray-600 focus:outline-none text-sm">
            <option value="gemini-1.5-flash">Gemini 1.5 Flash (Recommended)</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro (Best for SRT)</option>
            <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash (Experimental)</option>
        </select>
    </div>

    <div class="bg-[#161f32] p-5 rounded-2xl border border-gray-700 shadow-xl">
        <input type="file" id="fileInput" class="mb-4 block w-full text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:bg-blue-600 file:text-white file:border-0 hover:file:bg-blue-700 cursor-pointer">
        
        <select id="taskType" class="w-full p-3 rounded-xl bg-[#1e293b] border border-gray-600 mb-4 focus:outline-none text-sm">
            <option value="transcribe">Transcribe (Media to Text)</option>
            <option value="srt-translate">SRT to SRT Myanmar</option>
        </select>

        <button id="actionBtn" class="w-full bg-green-600 py-4 rounded-xl hover:bg-green-700 font-bold transition-all shadow-lg active:scale-95 text-white">
            <i class="fas fa-play mr-2"></i> Start Process
        </button>
    </div>

    <div class="bg-black p-4 rounded-xl border border-gray-700">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-[10px] text-gray-500 font-bold uppercase">Console / Result</h3>
            <button onclick="copyText()" class="text-[10px] text-blue-400 border border-blue-900 px-2 py-1 rounded">COPY</button>
        </div>
        <textarea id="output" class="w-full h-64 bg-black text-green-500 text-xs font-mono outline-none resize-none" placeholder="Waiting for input..." readonly></textarea>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
