<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Transcription Studio</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .card {
            background-color: #1e293b;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        .label {
            font-size: 13px;
            font-weight: 700;
            color: #94a3b8;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-box {
            width: 100%;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-size: 15px;
        }

        .btn-blue {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .upload-area {
            border: 2px dashed #334155;
            border-radius: 15px;
            padding: 30px 10px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .upload-icon {
            background-color: #2563eb33;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            color: #38bdf8;
            font-size: 24px;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .row select {
            flex: 1;
            background-color: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 10px;
        }

        .btn-green {
            width: 100%;
            background-color: #15803d;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }

        /* Result Area */
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .btn-download {
            background-color: #1e3a8a;
            color: #38bdf8;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        .display-area {
            background-color: #000;
            border-radius: 12px;
            padding: 20px;
            min-height: 200px;
            border: 1px solid #334155;
            color: #22c55e;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
