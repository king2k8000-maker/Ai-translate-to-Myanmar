<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Transcription Studio</title>
    <script type="importmap">
        {
          "imports": {
            "@google/generative-ai": "https://esm.run/@google/generative-ai"
          }
        }
    </script>
    <style>
        /* အရင်အတိုင်း UI Styles များ */
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 450px; }
        .card { background-color: #1e293b; border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid #334155; }
        .label { font-size: 13px; font-weight: 700; color: #4da3ff; margin-bottom: 15px; text-transform: uppercase; }
        .input-box { width: 100%; background-color: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 15px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        .btn-green { width: 100%; background-color: #15803d; color: white; border: none; border-radius: 12px; padding: 18px; font-weight: 700; cursor: pointer; }
        .display-area { background-color: #000; border-radius: 12px; padding: 20px; min-height: 180px; border: 1px solid #334155; color: #22c55e; font-family: monospace; white-space: pre-wrap; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="label">API ACCESS</div>
        <input type="password" id="apiKey" class="input-box" placeholder="Enter Gemini API Key">
        <select class="input-box" id="modelSelect">
            <option value="gemini-1.5-flash" selected>Gemini 1.5 Flash</option>
            <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
        </select>
    </div>

    <div class="card">
        <div class="label">MEDIA UPLOAD</div>
        <input type="file" id="fileInput" class="input-box" accept=".srt,.txt">
        <button class="btn-green" id="startBtn">Start Translation</button>
    </div>

    <div class="card">
        <div class="label">RESULT</div>
        <div class="display-area" id="output">ဘာသာပြန်ရလဒ် ဤနေရာတွင် ပေါ်လာမည်...</div>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    document.getElementById('startBtn').addEventListener('click', async () => {
        const key = document.getElementById('apiKey').value;
        const fileInput = document.getElementById('fileInput');
        const output = document.getElementById('output');
        const modelName = document.getElementById('modelSelect').value;

        if (!key) return alert("API Key ထည့်ပေးပါ");
        if (fileInput.files.length === 0) return alert("File ရွေးပေးပါ");

        const file = fileInput.files[0];
        const text = await file.text();

        output.innerText = "ဘာသာပြန်နေပါပြီ... ခဏစောင့်ပါ...";

        try {
            const genAI = new GoogleGenerativeAI(key);
            const model = genAI.getGenerativeModel({ model: modelName });

            const prompt = `Translate the following subtitle text into Myanmar (Burmese) language. Keep the original SRT timecodes and numbering format exactly as they are. Here is the text: \n\n ${text}`;

            const result = await model.generateContent(prompt);
            const response = await result.response;
            output.innerText = response.text();
        } catch (error) {
            output.innerText = "Error: " + error.message;
        }
    });
</script>

</body>
</html>
